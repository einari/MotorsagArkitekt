<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MOTORSAG ARKITEKT — a Kattene production</title>
    <style>
      /* Fonts are registered at runtime via the FontFace API (see
         src/text/fonts.ts) so Vite emits base-correct, fingerprinted URLs that
         work on a GitHub Pages project subpath. The family names below resolve
         once those faces finish loading. */
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        cursor: none;
      }
      #stage {
        position: fixed; inset: 0;
        display: block;
        width: 100vw; height: 100vh;
      }
      canvas#gl { display: block; width: 100%; height: 100%; }

      /* Boot / start screen */
      #boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 2.2rem;
        background:
          radial-gradient(120% 90% at 50% 0%, #2a1033 0%, #150a1f 45%, #05030a 100%);
        z-index: 10;
        cursor: pointer;
        transition: opacity 0.6s ease;
      }
      #boot.hidden { opacity: 0; pointer-events: none; }
      .boot-title {
        font-family: 'PressStart', monospace;
        font-size: clamp(18px, 4.2vw, 56px);
        line-height: 1.5;
        text-align: center;
        color: #ff5ec7;
        text-shadow:
          0 0 8px #ff2ea6,
          0 0 22px #ff2ea6,
          4px 4px 0 #2a0a3a;
        letter-spacing: 2px;
      }
      .boot-sub {
        font-family: 'VT323', monospace;
        font-size: clamp(16px, 2.4vw, 28px);
        color: #6ee7ff;
        text-shadow: 0 0 10px #2bd4ff;
        text-align: center;
        max-width: 80ch;
        line-height: 1.3;
      }
      .boot-start {
        font-family: 'PressStart', monospace;
        font-size: clamp(12px, 2vw, 20px);
        color: #ffe45e;
        border: 3px solid #ffe45e;
        padding: 0.8rem 1.6rem;
        text-shadow: 0 0 8px #ffba2e;
        box-shadow: 0 0 18px rgba(255,228,94,0.4), inset 0 0 12px rgba(255,228,94,0.15);
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.06); opacity: 1; }
      }
      .boot-loading {
        font-family: 'VT323', monospace;
        font-size: clamp(14px, 2vw, 22px);
        color: #b58cff;
      }
      .scanline-overlay {
        position: fixed; inset: 0; z-index: 11;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0,0,0,0) 0px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0.18) 3px,
          rgba(0,0,0,0) 4px
        );
        mix-blend-mode: multiply;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="gl"></canvas>
    </div>

    <div id="boot">
      <div class="boot-title">MOTORSAG<br />ARKITEKT</div>
      <div class="boot-sub">
        a <b>KATTENE</b> production &mdash; synthwave demoscene<br />
        cats with chainsaws &middot; architecture-seeking horses &middot; spaceships
      </div>
      <div id="bootAction" class="boot-loading">loading&hellip;</div>
    </div>

    <div class="scanline-overlay"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
